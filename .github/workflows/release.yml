name: Release APK

on:
  push:
    branches:
      - master
    paths:
      - 'app/build.gradle.kts'
      - 'app/src/main/AndroidManifest.xml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "Version: v${VERSION_NAME}"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.version }} already exists — skipping release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v4
        if: steps.check_tag.outputs.exists == 'false'
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        if: steps.check_tag.outputs.exists == 'false'

      - name: Decode keystore
        if: steps.check_tag.outputs.exists == 'false'
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Decode google-services.json
        if: steps.check_tag.outputs.exists == 'false'
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > app/google-services.json

      - name: Set versionCode from run_number
        if: steps.check_tag.outputs.exists == 'false'
        run: sed -i "s/versionCode = [0-9]*/versionCode = ${{ github.run_number }}/" app/build.gradle.kts

      - name: Build release APK
        if: steps.check_tag.outputs.exists == 'false'
        run: ./gradlew assembleRelease
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Re-sign APK with v1+v2
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          UNSIGNED=/tmp/app-unsigned.apk
          cp "$APK" "$UNSIGNED"
          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled false \
            --v4-signing-enabled false \
            --min-sdk-version 21 \
            --ks app/release.keystore \
            --ks-key-alias alcoholchecker \
            --ks-pass "pass:${{ secrets.RELEASE_STORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.RELEASE_KEY_PASSWORD }}" \
            --out "$APK" \
            "$UNSIGNED"
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify -v "$APK" | head -8

      - name: Generate APK checksum
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          sha256sum app/build/outputs/apk/release/app-release.apk | awk '{print $1}' > app/build/outputs/apk/release/app-release.apk.sha256
          echo "APK_SHA256=$(cat app/build/outputs/apk/release/app-release.apk.sha256)" >> "$GITHUB_ENV"

      - name: Create tag and GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/release/app-release.apk.sha256
          generate_release_notes: true
          body: |
            ## APK Checksum (SHA-256)
            ```
            ${{ env.APK_SHA256 }}
            ```

      - name: Deploy APK to GitHub Pages
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cp app/build/outputs/apk/release/app-release.apk /tmp/app-release.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/app-release.apk app-release.apk
          git add app-release.apk
          git commit -m "Update APK to ${{ steps.version.outputs.version }}"
          git push origin gh-pages

      - name: Trigger OTA update for dev devices
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION_NAME=$(echo "${{ steps.version.outputs.version }}" | sed 's/^v//')
          curl -s -X POST "https://alc-app.m-tama-ramu.workers.dev/api/devices/trigger-update-dev" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Secret: ${{ secrets.FCM_INTERNAL_SECRET }}" \
            -d "{\"version_code\":${{ github.run_number }},\"version_name\":\"${VERSION_NAME}\"}" \
            | tee /dev/stderr | jq .
          echo "OTA trigger sent for dev devices (v${VERSION_NAME}/${{ github.run_number }})"
